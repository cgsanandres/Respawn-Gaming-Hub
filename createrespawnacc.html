<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respawn Gaming Hub - Create Account</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        :root { --accent: #00e5ff; }
        
        .logo { font-size: 2rem; font-weight: 700; margin-bottom: 30px; }
        .logo span { color: var(--accent); }
        
        .signup-card { background: #1e1e1e; padding: 40px; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 229, 255, 0.15); width: 100%; max-width: 400px; }
        h2 { margin-bottom: 25px; text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #ccc; }
        input { width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #3d3d3d; border-radius: 4px; color: #fff; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 5px rgba(0, 229, 255, 0.5); }
        
        .btn { width: 100%; padding: 12px; background: var(--accent); color: #121212; border: none; border-radius: 4px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #00b8cc; }
        
        .terms { font-size: 0.9rem; color: #ccc; margin: 15px 0; }
        .terms a { color: var(--accent); text-decoration: none; }
        .terms a:hover { text-decoration: underline; }
        
        .login-link { text-align: center; margin-top: 20px; }
        .login-link a { color: var(--accent); text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="logo">RESPAWN <span>GAMING HUB</span></div>
    
    <div class="signup-card">
        <h2>CREATE YOUR GAMER ACCOUNT</h2>
        
        <form>
            <div class="form-group">
                <label for="gamerTag">Gamer Tag (Unique)</label>
                <input type="text" id="gamerTag" required placeholder="Choose your display name">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Min. 8 chars (letters + numbers)">
            </div>
            
            <div class="form-group">
                <label for="confirmPass">Confirm Password</label>
                <input type="password" id="confirmPass" required placeholder="Repeat your password">
            </div>
            
            <div class="terms">
                <input type="checkbox" id="agree" required>
                <label for="agree">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
            </div>
            
            <button type="submit" class="btn">CREATE ACCOUNT</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="respawnlogin.html">Login Here</a>
        </div>
    </div>
</body>
</html>
